name: Deploy Viewer to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'rjtd/crates/rjtd-wasm/**'
      - 'rjtd/crates/rjtd-core/**'
      - 'rjtd/crates/rjtd-model/**'
      - 'rjtd/Cargo.toml'
      - 'rjtd/Cargo.lock'
      - 'openjtd.github.io/**'
      - '.github/workflows/deploy-viewer.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rjtd/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('rjtd/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build --target web rjtd/crates/rjtd-wasm

      - name: Copy pkg into viewer
        run: cp -r rjtd/crates/rjtd-wasm/pkg openjtd.github.io/pkg

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: openjtd.github.io

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
